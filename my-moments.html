<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Moments - AzureTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <nav class="bg-white shadow-sm h-14 flex items-center px-6 sticky top-0 z-50">
        <div class="flex items-center space-x-2 text-purple-600 font-black text-xl">
            <span>Trade</span><span class="text-purple-700">AzureTrade</span>
        </div>
        <div class="ml-auto flex items-center space-x-4">
            <a href="profile.html" class="text-sm text-gray-500 hover:text-purple-600">&larr; Back to Profile</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto pt-6 px-4 pb-10">

        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-xl font-black text-gray-900">My Moments</h1>
                <p class="text-xs text-gray-400 mt-1">All your posted moments</p>
            </div>
        </div>

        <!-- Post Moment -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-6">
            <textarea id="moment-input" rows="3" placeholder="Share your thoughts..." class="w-full border-0 text-sm focus:outline-none resize-none placeholder-gray-400"></textarea>
            <div class="flex items-center justify-between mt-2 pt-2 border-t border-gray-100">
                <div class="flex gap-3 text-gray-400 text-sm">
                    <span class="cursor-pointer hover:text-purple-500 transition">Photo</span>
                    <span class="cursor-pointer hover:text-purple-500 transition">Location</span>
                    <span class="cursor-pointer hover:text-purple-500 transition"># Topic</span>
                </div>
                <button id="post-moment-btn" class="px-5 py-1.5 bg-purple-600 text-white rounded-full text-xs font-bold hover:bg-purple-700 transition">Post</button>
            </div>
        </div>

        <div id="moment-list" class="space-y-4"></div>

        <div id="empty-state" class="hidden text-center py-20">
            <div class="text-5xl mb-4">💬</div>
            <p class="text-gray-400 text-sm">No moments yet</p>
