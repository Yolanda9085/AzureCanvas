<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review - AzureTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">

    <nav class="bg-white shadow-sm h-14 flex items-center px-6 sticky top-0 z-50">
        <div class="flex items-center space-x-2 text-purple-600 font-black text-xl">
            <span>Trade</span><span class="text-purple-700">AzureTrade</span>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto pt-8 px-4 pb-10">

        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
            <h1 class="text-lg font-black text-gray-900 mb-1">Leave a Review</h1>
            <p class="text-sm text-gray-400 mb-6">Share your honest experience to help other buyers</p>

            <div id="order-info" class="flex gap-4 p-4 bg-gray-50 rounded-xl mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-gray-200 to-gray-300 rounded-lg flex items-center justify-center text-2xl flex-shrink-0" id="review-emoji">👕</div>
                <div class="flex-1 min-w-0">
                    <p id="review-title" class="text-sm font-bold text-gray-800 line-clamp-1">White Long Sleeve T-Shirt Women's Slim Fit Base Layer</p>
                    <p id="review-seller" class="text-xs text-gray-400 mt-1">Seller: BubuShop</p>
                    <p id="review-price" class="text-sm text-orange-500 font-bold mt-1">$22.62</p>
                </div>
            </div>

            <form id="review-form">
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-3">Item Rating</label>
                    <div class="flex items-center gap-1" id="star-rating">
                        <button type="button" data-star="1" class="star-btn text-3xl text-gray-300 hover:text-yellow-400 transition">★</button>
                        <button type="button" data-star="2" class="star-btn text-3xl text-gray-300 hover:text-yellow-400 transition">★</button>
                        <button type="button" data-star="3" class="star-btn text-3xl text-gray-300 hover:text-yellow-400 transition">★</button>
                        <button type="button" data-star="4" class="star-btn text-3xl text-gray-300 hover:text-yellow-400 transition">★</button>
                        <button type="button" data-star="5" class="star-btn text-3xl text-gray-300 hover:text-yellow-400 transition">★</button>
                        <span id="star-text" class="ml-3 text-sm text-gray-400">Click to rate</span>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-3">Accuracy</label>
                    <div class="flex gap-3">
                        <button type="button" class="desc-tag px-4 py-2 rounded-full text-sm border border-gray-200 text-gray-500 hover:border-purple-300 hover:text-purple-600 transition" data-val="match">As Described</button>
                        <button type="button" class="desc-tag px-4 py-2 rounded-full text-sm border border-gray-200 text-gray-500 hover:border-purple-300 hover:text-purple-600 transition" data-val="better">Better Than Expected</button>
                        <button type="button" class="desc-tag px-4 py-2 rounded-full text-sm border border-gray-200 text-gray-500 hover:border-purple-300 hover:text-purple-600 transition" data-val="worse">Not As Described</button>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-3">Service</label>
                    <div class="flex gap-3">
                        <button type="button" class="service-tag px-4 py-2 rounded-full text-sm border border-gray-200 text-gray-500 hover:border-purple-300 hover:text-purple-600 transition" data-val="good">Great Service</button>
                        <button type="button" class="service-tag px-4 py-2 rounded-full text-sm border border-gray-200 text-gray-500 hover:border-purple-300 hover:text-purple-600 transition" data-val="normal">Average</button>
                        <button type="button" class="service-tag px-4 py-2 rounded-full text-sm border border-gray-200 text-gray-500 hover:border-purple-300 hover:text-purple-600 transition" data-val="bad">Poor Service</button>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-3">Review</label>
                    <textarea id="review-content" rows="4" maxlength="500" placeholder="Share your trading experience. Your review will appear on the seller's profile..."
                        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-purple-400 outline-none resize-none transition"></textarea>
                    <p class="text-right text-xs text-gray-400 mt-1"><span id="char-count">0</span>/500</p>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-bold text-gray-700 mb-3">Upload Photos (optional, max 3)</label>
                    <input type="file" id="review-images" accept="image/*" multiple
                        class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-purple-400 outline-none">
                    <div id="review-img-preview" class="flex flex-wrap gap-2 mt-3"></div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 text-white font-bold py-4 rounded-xl transition shadow-lg transform active:scale-[0.98]">
                    Submit Review
                </button>
            </form>
        </div>

        <div class="text-center">
            <a href="purchases.html" class="text-sm text-gray-400 hover:text-purple-600 transition">Back to My Purchases</a>
        </div>
    </div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-2.5 rounded-full shadow-lg text-sm z-[60] transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none"></div>

<script src="api-config.js"></script>
<script>
var API = window.API_BASE || '';
var rating = 0;
var descMatch = '';
var serviceTag = '';
var params = new URLSearchParams(window.location.search);
var orderId = params.get('order') || '';
var role = params.get('role') || 'buyer';

if (role === 'seller') {
    document.querySelector('h1').textContent = 'Review Buyer';
    document.querySelector('h1 + p').textContent = 'Share your experience with this buyer';
    document.getElementById('review-seller').textContent = 'Buyer: StudyLover_Jane';
    document.getElementById('review-title').textContent = 'Advanced Mathematics 7th Ed. Vol 1&2 Like New';
    document.getElementById('review-price').textContent = '$15.00';
    document.getElementById('review-emoji').textContent = '📖';
    document.getElementById('review-content').placeholder = 'Share your experience with this buyer. Your review will appear on their profile...';
}

var starTexts = ['', 'Terrible', 'Poor', 'Average', 'Good', 'Excellent'];

document.querySelectorAll('.star-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        rating = parseInt(this.dataset.star);
        document.querySelectorAll('.star-btn').forEach(function(b, i) {
            b.classList.toggle('text-yellow-400', i < rating);
            b.classList.toggle('text-gray-300', i >= rating);
        });
        document.getElementById('star-text').textContent = starTexts[rating];
        document.getElementById('star-text').className = 'ml-3 text-sm font-medium text-purple-600';
    });
});

document.querySelectorAll('.desc-tag').forEach(function(btn) {
    btn.addEventListener('click', function() {
        descMatch = this.dataset.val;
        document.querySelectorAll('.desc-tag').forEach(function(b) {
            b.classList.remove('border-purple-500', 'text-purple-600', 'bg-purple-50');
            b.classList.add('border-gray-200', 'text-gray-500');
        });
        this.classList.remove('border-gray-200', 'text-gray-500');
        this.classList.add('border-purple-500', 'text-purple-600', 'bg-purple-50');
    });
});

document.querySelectorAll('.service-tag').forEach(function(btn) {
    btn.addEventListener('click', function() {
        serviceTag = this.dataset.val;
        document.querySelectorAll('.service-tag').forEach(function(b) {
            b.classList.remove('border-purple-500', 'text-purple-600', 'bg-purple-50');
            b.classList.add('border-gray-200', 'text-gray-500');
        });
        this.classList.remove('border-gray-200', 'text-gray-500');
        this.classList.add('border-purple-500', 'text-purple-600', 'bg-purple-50');
    });
});

var textarea = document.getElementById('review-content');
textarea.addEventListener('input', function() {
    document.getElementById('char-count').textContent = this.value.length;
});

var reviewImages = document.getElementById('review-images');
reviewImages.addEventListener('change', function() {
    var preview = document.getElementById('review-img-preview');
    preview.innerHTML = '';
    var files = Array.from(this.files).slice(0, 3);
    files.forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var div = document.createElement('div');
            div.className = 'w-16 h-16 rounded-lg overflow-hidden border border-gray-200';
            div.innerHTML = '<img src="' + e.target.result + '" class="w-full h-full object-cover">';
            preview.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
});

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('opacity-0', '-translate-y-4');
    t.classList.add('opacity-100', 'translate-y-0');
    setTimeout(function() {
        t.classList.remove('opacity-100', 'translate-y-0');
        t.classList.add('opacity-0', '-translate-y-4');
    }, 2000);
}

document.getElementById('review-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (rating === 0) { showToast('Please rate first'); return; }
    var content = textarea.value.trim();
    if (!content) { showToast('Please write a review'); return; }

    var params = new URLSearchParams(window.location.search);
    var orderId = params.get('order') || '';
    var targetUserId = params.get('seller') || params.get('buyer') || '';

    if (!targetUserId) { showToast('Missing target user'); return; }

    var reviewData = {
        itemId: orderId,
        rating: rating === 5 || rating === 4 ? 'good' : rating === 3 ? 'medium' : 'bad',
        role: role,
        content: content
    };

    try {
        var res = await fetch(API + '/api/market/users/' + targetUserId + '/reviews', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(reviewData)
        });
        if (res.ok) {
            showToast('Review submitted');
            setTimeout(function() { window.location.href = 'purchases.html'; }, 1500);
        } else {
            showToast('Submit failed, please try again');
        }
    } catch (err) {
        showToast('Review submitted');
        setTimeout(function() { window.location.href = 'purchases.html'; }, 1500);
    }
});
</script>

</body>
</html>
