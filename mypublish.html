// Sync ticket and cross-category items to localStorage for barter feature
(function syncTicketsToStorage() {
    var barterItems = pubItems.filter(function(i) { return i.id.startsWith('ticket_') || i.id.startsWith('cross_'); });
    var existing = [];
    try { existing = JSON.parse(localStorage.getItem('publishedItems') || '[]'); } catch(e) {}
    var existingIds = existing.map(function(i) { return i.id; });
    barterItems.forEach(function(t) {
        if (existingIds.indexOf(t.id) === -1) {
            existing.push({
                id: t.id,
                title: t.title,
                price: t.price,
                category: t.category,
                description: t.description,
                images: t.images,
                emoji: t.emoji,
                status: 'available',
                createdAt: new Date().toISOString()
            });
        }
    });
    localStorage.setItem('publishedItems', JSON.stringify(existing));
})();

var statusMap = {
    selling: { text:'On Sale', cls:'bg-green-100 text-green-600' },
    sold:    { text:'Sold', cls:'bg-gray-100 text-gray-500' },
    off:     { text:'Delisted', cls:'bg-red-50 text-red-400' }
};
function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('opacity-0', '-translate-y-4');
    t.classList.add('opacity-100', 'translate-y-0');
    setTimeout(function() {
        t.classList.remove('opacity-100', 'translate-y-0');
        t.classList.add('opacity-0', '-translate-y-4');
    }, 2000);
}

function updateTabCounts() {
    var allCount = pubItems.length;
    var sellingCount = pubItems.filter(function(i) { return i.status === 'selling'; }).length;
    var soldCount = pubItems.filter(function(i) { return i.status === 'sold'; }).length;
    var offCount = pubItems.filter(function(i) { return i.status === 'off'; }).length;
    document.getElementById('tab-count-all').textContent = allCount;
    document.getElementById('tab-count-selling').textContent = sellingCount;
    document.getElementById('tab-count-sold').textContent = soldCount;
    document.getElementById('tab-count-off').textContent = offCount;
    var sidebarCount = document.getElementById('sidebar-publish-count');
    if (sidebarCount) sidebarCount.textContent = allCount;
}


function renderPublished(filter) {
    var list = document.getElementById('pub-list');
    list.innerHTML = '';
    var items = filter === 'all' ? pubItems : pubItems.filter(function(i){ return i.status === filter; });
    document.getElementById('pub-count').textContent = items.length + ' items total';
    updateTabCounts();
    items.forEach(function(item) {
        var s = statusMap[item.status];

        var imgHtml;
        if (item.images && item.images.length > 0) {
            var imgSrc = item.images[0];
            if (!imgSrc.startsWith('http')) {
                if (imgSrc.startsWith('/')) imgSrc = API + imgSrc;
                else if (imgSrc.startsWith('images/')) imgSrc = imgSrc;
                else imgSrc = API + '/resources/' + imgSrc;
            }
            imgHtml = '<img src="' + imgSrc + '" class="w-full h-full object-cover">';
        } else {
            imgHtml = '<div class="w-full h-full bg-gradient-to-br ' + item.bg + ' flex items-center justify-center text-3xl">' + item.emoji + '</div>';
        }

        var card = document.createElement('div');
        card.className = 'bg-white rounded-2xl p-5 shadow-sm hover:shadow-md transition cursor-pointer';
        var sellerLine = currentUsername ? '<p class="text-xs text-gray-400 mt-0.5">Seller: ' + currentUsername + '</p>' : '';
        var descLine = item.description ? '<p class="text-xs text-gray-500 mt-1 line-clamp-1">' + item.description + '</p>' : '';
        card.innerHTML =
            '<a href="javascript:;" class="item-link flex gap-4 cursor-pointer" data-id="' + item.id + '">' +
                '<div class="w-24 h-24 bg-gray-50 rounded-xl flex-shrink-0 overflow-hidden border border-gray-100">' +
                    imgHtml +
                '</div>' +
                '<div class="flex-1 flex flex-col justify-between min-w-0 py-1">' +
                    '<div class="flex justify-between items-start gap-4">' +
                        '<div class="min-w-0"><h3 class="text-sm md:text-base text-gray-800 leading-snug line-clamp-2">' + item.title + '</h3>' + sellerLine + descLine + '</div>' +
                        '<span class="text-[11px] px-2 py-0.5 rounded flex-shrink-0 ' + s.cls + '">' + s.text + '</span>' +
                    '</div>' +
                    '<div class="flex items-center justify-between mt-2">' +
                        '<span class="text-orange-500 font-black text-lg">¥' + item.price + '</span>' +
                        '<div class="flex items-center space-x-3 text-xs text-gray-400">' +
                            '<span>' + item.wants + ' want this</span>' +
                            '<span>' + item.views + ' views</span>' +
                            '<span>' + item.time + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</a>';

        // Click item link - save data to sessionStorage then navigate
        card.addEventListener('click', function() {
            sessionStorage.setItem('viewProduct', JSON.stringify({
                id: item.id,
                title: item.title,
                price: item.price,
                description: item.description || item.title,
                emoji: item.emoji,
                seller: currentUsername || 'Me',
                tags: [item.category || 'Second-hand'],
                images: item.images || []
            }));
            window.location.href = 'product.html?id=' + item.id;
        });

        list.appendChild(card);
    });
}
// Delist item
async function offShelfItem(itemId) {
    if (!confirm('Are you sure you want to delist this item?')) return;
    try {
        var res = await fetch(API + '/api/market/items/' + itemId + '/off', { method: 'PUT', credentials: 'include' });
        if (res.ok) {
            showToast('Delisted');
            var item = pubItems.find(function(i) { return i.id === itemId; });
            if (item) item.status = 'off';
            renderPublished(currentFilter);
        } else {
            showToast('Failed to delist');
        }
    } catch (e) {
        showToast('Network error');
    }
}

// Delete item
async function deleteItem(itemId) {
    if (!confirm('Are you sure you want to delete this item? This cannot be undone.')) return;
    try {
        var res = await fetch(API + '/api/market/items/' + itemId, { method: 'DELETE', credentials: 'include' });
        if (res.ok) {
            showToast('Deleted');
            pubItems = pubItems.filter(function(i) { return i.id !== itemId; });
            renderPublished(currentFilter);
        } else {
            showToast('Failed to delete');
        }
    } catch (e) {
        showToast('Network error');
    }
}

// Edit modal
var editModal = document.getElementById('edit-modal');
var editCloseBtn = document.getElementById('edit-close-btn');
var editForm = document.getElementById('edit-form');
var editImageFiles = [];

function openEditModal(item) {
    document.getElementById('edit-item-id').value = item.id;
    document.getElementById('edit-title').value = item.title || '';
    document.getElementById('edit-price').value = item.price || '';
    document.getElementById('edit-description').value = item.description || '';
    document.getElementById('edit-category').value = item.category || '';
    document.getElementById('edit-condition').value = item.condition || '';
    editImageFiles = [];
    var preview = document.getElementById('edit-image-preview');
    preview.innerHTML = '';
    if (item.images && item.images.length > 0) {
        item.images.forEach(function(img) {
            var imgSrc = img.startsWith('http') ? img : (img.startsWith('/') ? API + img : (img.startsWith('images/') ? img : API + '/resources/' + img));
            var div = document.createElement('div');
            div.className = 'w-16 h-16 rounded-lg overflow-hidden border border-gray-200';
            div.innerHTML = '<img src="' + imgSrc + '" class="w-full h-full object-cover">';
            preview.appendChild(div);
        });
    }
    editModal.classList.remove('hidden');
    editModal.classList.add('flex');
}
// Edit modal image preview
(function() {
    var fileInput = document.getElementById('edit-images');
    var preview = document.getElementById('edit-image-preview');
    if (!fileInput) return;
    fileInput.addEventListener('change', function() {
        editImageFiles = Array.from(fileInput.files).slice(0, 9);
        preview.innerHTML = '';
        editImageFiles.forEach(function(file, index) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var wrapper = document.createElement('div');
                wrapper.className = 'w-16 h-16 rounded-lg overflow-hidden border border-gray-200 relative group';
                wrapper.innerHTML =
                    '<img src="' + e.target.result + '" class="w-full h-full object-cover">' +
                    '<button type="button" data-idx="' + index + '" class="absolute top-0 right-0 w-4 h-4 bg-red-500 text-white text-[10px] rounded-bl opacity-0 group-hover:opacity-100">&times;</button>';
                preview.appendChild(wrapper);
                wrapper.querySelector('button').addEventListener('click', function() {
                    editImageFiles.splice(parseInt(this.dataset.idx), 1);
                    var dt = new DataTransfer();
                    editImageFiles.forEach(function(f) { dt.items.add(f); });
                    fileInput.files = dt.files;
                    fileInput.dispatchEvent(new Event('change'));
                });
            };
            reader.readAsDataURL(file);
        });
    });
})();

function closeEditModal() {
    editModal.classList.add('hidden');
    editModal.classList.remove('flex');
}

editCloseBtn.addEventListener('click', closeEditModal);
editModal.addEventListener('click', function(e) { if (e.target === editModal) closeEditModal(); });

editForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    var itemId = document.getElementById('edit-item-id').value;
    var data = {
        title: document.getElementById('edit-title').value,
        price: parseFloat(document.getElementById('edit-price').value),
        description: document.getElementById('edit-description').value,
        category: document.getElementById('edit-category').value,
        condition: parseInt(document.getElementById('edit-condition').value) || null,
        status: 'available'
    };
    try {
        // If there are new images, upload first
        if (editImageFiles.length > 0) {
            var formData = new FormData();
            editImageFiles.forEach(function(f) { formData.append('files', f); });
            var uploadRes = await fetch(API + '/api/v1/images/upload', { method: 'POST', body: formData });
            if (uploadRes.ok) {
                var imageUuids = await uploadRes.json();
                data.images = imageUuids;
            }
        }

        var res = await fetch(API + '/api/market/items/' + itemId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: API ? 'omit' : 'include',
            body: JSON.stringify(data)
        });
        if (res.ok) {
            showToast('Listed successfully');
            closeEditModal();
            var item = pubItems.find(function(i) { return i.id === itemId; });
            if (item) {
                item.title = data.title;
                item.price = data.price;
                item.description = data.description;
                item.category = data.category;
                item.status = 'selling';
            }
            renderPublished(currentFilter);
        } else {
            showToast('Operation failed, please retry');
        }
    } catch (err) {
        showToast('Network error');
    }
});
