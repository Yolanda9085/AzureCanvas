<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites — MUST Treehole</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .fav-layout { max-width: 860px; margin: 32px auto; padding: 0 20px; }
    .fav-tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .fav-tab {
      flex: 1; padding: 13px 10px; text-align: center; cursor: pointer;
      font-size: 0.95rem; font-weight: 500; color: var(--text-muted);
      border-bottom: 2px solid transparent; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 7px;
      position: relative;
    }
    .fav-tab:hover { background: var(--hover-bg); color: var(--text); }
    .fav-tab.active { color: var(--text); border-bottom-color: var(--text); background: var(--bg-subtle); font-weight: 600; }
    .fav-tab .tab-badge {
      background: #e00; color: #fff; font-size: 0.68rem;
      padding: 1px 6px; border-radius: 20px; min-width: 18px; text-align: center;
    }

    .fav-section { display: none; }
    .fav-section.active { display: block; }

    .fav-empty { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 1rem; }
    .fav-empty i { font-size: 2.4rem; display: block; margin-bottom: 12px; }

    /* Following List */
    .following-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px 20px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 14px;
      transition: var(--transition);
    }
    .following-card:hover { border-color: #aaa; box-shadow: var(--shadow-sm); }
    .following-card-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--bg-inset); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; flex-shrink: 0;
    }
    .following-card-info { flex: 1; min-width: 0; }
    .following-card-name { font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
    .following-card-meta { font-size: 0.82rem; color: var(--text-muted); }
    .unfollow-btn {
      padding: 5px 14px; border: 1px solid var(--border);
      border-radius: 20px; background: var(--bg); font-size: 0.82rem;
      cursor: pointer; transition: var(--transition); font-family: inherit;
      color: var(--text-muted); white-space: nowrap;
    }
    .unfollow-btn:hover { background: #fff0f0; border-color: #e00; color: #e00; }

    /* Notification List */
    .notif-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px 18px;
      margin-bottom: 10px; transition: var(--transition);
    }
    .notif-item:hover { border-color: #aaa; }
    .notif-item.unread { border-left: 3px solid #e00; }
    .notif-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .notif-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-inset); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
    .notif-meta { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
    .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #e00; flex-shrink: 0; }
    .notif-content { font-size: 0.95rem; color: var(--text); line-height: 1.6; }
    .notif-link {
      display: inline-block; margin-top: 6px; font-size: 0.82rem;
      color: var(--text-muted); cursor: pointer; text-decoration: underline;
      background: none; border: none; font-family: inherit; padding: 0;
    }
    .notif-link:hover { color: var(--text); }
    .notif-type-tag {
      font-size: 0.72rem; padding: 2px 8px; border-radius: 20px;
      background: var(--bg-inset); color: var(--text-muted); border: 1px solid var(--border-muted);
    }

    /* Message Thread List */
    .msg-thread-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px 18px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: var(--transition);
    }
    .msg-thread-item:hover { border-color: #aaa; box-shadow: var(--shadow-sm); }
    .msg-thread-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--bg-inset); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; flex-shrink: 0; position: relative;
    }
    .msg-thread-unread-dot {
      position: absolute; top: 0; right: 0;
      width: 10px; height: 10px; border-radius: 50%; background: #e00;
      border: 2px solid var(--bg);
    }
    .msg-thread-info { flex: 1; min-width: 0; }
    .msg-thread-name { font-weight: 600; font-size: 0.97rem; margin-bottom: 2px; }
    .msg-thread-preview { font-size: 0.82rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .msg-thread-time { font-size: 0.75rem; color: var(--text-light); white-space: nowrap; }

    .mark-all-read {
      font-size: 0.82rem; color: var(--text-muted); cursor: pointer;
      background: none; border: none; font-family: inherit; padding: 4px 8px;
      border-radius: var(--radius); transition: var(--transition);
    }
    .mark-all-read:hover { background: var(--hover-bg); color: var(--text); }

    .section-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-count { font-size: 0.88rem; color: var(--text-muted); }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="nav-logo">
    <i class="fas fa-tree"></i> Azurecanvas-Treehole
    <span class="badge">MUST</span>
  </div>
  <div class="nav-actions" style="margin-left:auto">
    <button class="btn" onclick="window.location.href='index.html'">
      <i class="fas fa-arrow-left"></i> Back to Home
    </button>
  </div>
</nav>

<div class="fav-layout">
  <div class="fav-tabs">
    <div class="fav-tab active" data-tab="favorites">
      <i class="fas fa-bookmark"></i> My Favorites
    </div>
    <div class="fav-tab" data-tab="likes">
      <i class="fas fa-heart"></i> My Likes
    </div>
    <div class="fav-tab" data-tab="following">
      <i class="fas fa-user-check"></i> Following
    </div>
    <div class="fav-tab" data-tab="comments">
      <i class="fas fa-comment-dots"></i> Comment Replies
      <span class="tab-badge" id="commentBadge" style="display:none">0</span>
    </div>
    <div class="fav-tab" data-tab="messages">
      <i class="fas fa-envelope"></i> Message Replies
      <span class="tab-badge" id="msgBadge" style="display:none">0</span>
    </div>
  </div>

  <!-- My Favorites -->
  <div class="fav-section active" id="tab-favorites">
    <div class="section-toolbar">
      <span class="section-count" id="favCount"></span>
    </div>
    <div id="favList"></div>
  </div>

  <!-- My Likes -->
  <div class="fav-section" id="tab-likes">
    <div class="section-toolbar">
      <span class="section-count" id="likesCount"></span>
    </div>
    <div id="likesList"></div>
  </div>

  <!-- Following -->
  <div class="fav-section" id="tab-following">
    <div class="section-toolbar">
      <span class="section-count" id="followingCount"></span>
    </div>
    <div id="followingList"></div>
  </div>

  <!-- Comment Replies -->
  <div class="fav-section" id="tab-comments">
    <div class="section-toolbar">
      <span class="section-count" id="commentsCount"></span>
      <button class="mark-all-read" id="markCommentsRead">Mark All as Read</button>
    </div>
    <div id="commentsList"></div>
  </div>

  <!-- Message Replies -->
  <div class="fav-section" id="tab-messages">
    <div class="section-toolbar">
      <span class="section-count" id="messagesCount"></span>
    </div>
    <div id="messagesList"></div>
  </div>
</div>

<script src="store.js"></script>
<script src="render.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  Store.init();

  // Tab 切换
  document.querySelectorAll(".fav-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".fav-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".fav-section").forEach(s => s.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
    });
  });

  // 根据 URL hash 激活对应 tab
  const hash = location.hash.replace("#", "");
  if (hash) {
    const target = document.querySelector(`.fav-tab[data-tab="${hash}"]`);
    if (target) target.click();
  }

  function formatTime(ts) {
    const diff = Date.now() - ts;
    if (diff < 60000) return "Just now";
    if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
    if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  function renderPostCard(post, actions) {
    const imgHtml = post.images && post.images.length
      ? `<div class="post-images">${post.images.map(u => `<img src="${u}" alt="">`).join("")}</div>`
      : "";
    const commentCount = post.comments ? post.comments.length : 0;
    return `
      <div class="post-card" style="cursor:default">
        <div class="post-header">
          <div class="avatar">${Render.escapeHtml(post.avatarLetter || "A")}</div>
          <div class="post-meta">
            <span class="post-author">${Render.escapeHtml(post.author)}</span>
            <span class="post-time">${formatTime(post.timestamp)}</span>
          </div>
        </div>
        <div class="post-body">${Render.escapeHtml(post.content)}</div>
        ${imgHtml}
        <div class="post-actions">
          <span class="action-btn"><i class="fas fa-heart"></i> ${post.likes || 0}</span>
          <span class="action-btn"><i class="far fa-comment"></i> ${commentCount}</span>
          ${actions}
        </div>
      </div>`;
  }

  // ===== My Collections =====
  (function() {
    const posts = Store.getCollectedPosts();
    document.getElementById("favCount").textContent = `Total ${posts.length} posts`;
    const listEl = document.getElementById("favList");
    if (posts.length === 0) {
      listEl.innerHTML = `<div class="fav-empty"><i class="far fa-bookmark"></i>No posts collected yet</div>`;
      return;
    }
    listEl.innerHTML = posts.map(post => renderPostCard(post,
      `<button class="action-btn collected" data-id="${post.id}"><i class="fas fa-bookmark"></i> Remove</button>`
    )).join("");
    listEl.querySelectorAll("[data-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        Store.toggleCollect(btn.dataset.id);
        btn.closest(".post-card").style.opacity = "0.4";
        btn.innerHTML = "Removed";
        btn.disabled = true;
      });
    });
  })();

  // ===== My Likes =====
  (function() {
    const posts = Store.posts.filter(p => p.liked);
    document.getElementById("likesCount").textContent = `Total ${posts.length} posts`;
    const listEl = document.getElementById("likesList");
    if (posts.length === 0) {
      listEl.innerHTML = `<div class="fav-empty"><i class="far fa-heart"></i>No posts liked yet</div>`;
      return;
    }
    listEl.innerHTML = posts.map(post => renderPostCard(post,
      `<button class="action-btn liked" data-like-id="${post.id}"><i class="fas fa-heart"></i> Unlike</button>`
    )).join("");
    listEl.querySelectorAll("[data-like-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        Store.toggleLike(btn.dataset.likeId);
        btn.closest(".post-card").style.opacity = "0.4";
        btn.innerHTML = "Removed";
        btn.disabled = true;
      });
    });
  })();

  // ===== My Following =====
  (async function() {
    const listEl = document.getElementById("followingList");
    const users = await Store.fetchFollowingFromApi();
    document.getElementById("followingCount").textContent = `Total ${users.length} users`;
    if (users.length === 0) {
      listEl.innerHTML = `<div class="fav-empty"><i class="fas fa-user-friends"></i>Not following anyone yet</div>`;
      return;
    }
    listEl.innerHTML = users.map(u => `
      <div class="following-card">
        <div class="following-card-avatar" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%); color: #fff;">${Render.escapeHtml(u.username ? u.username.substring(0, 1) : (u.avatarLetter || "U"))}</div>
        <div class="following-card-info">
          <div class="following-card-name">${Render.escapeHtml(u.username || u.nickname || "User")}</div>
          <div class="following-card-meta">ID: ${u.userId || u.id}</div>
        </div>
        <button class="unfollow-btn" data-uid="${u.userId || u.id}">Unfollow</button>
      </div>`).join("");
    listEl.querySelectorAll(".unfollow-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        await Store.unfollowUser(btn.dataset.uid);
        const card = btn.closest(".following-card");
        card.style.opacity = "0.4";
        btn.textContent = "Removed";
        btn.disabled = true;
      });
    });
  })();

  // ===== Comment Replies =====
  (function() {
    const notifications = Store.notifications.filter(n => n.type === "reply");
    const unread = notifications.filter(n => !n.read).length;
    const countEl = document.getElementById("commentsCount");
    countEl.textContent = `Total ${notifications.length} notifications${unread > 0 ? `, ${unread} unread` : ""}`;
    const badge = document.getElementById("commentBadge");
    if (unread > 0) {
      badge.style.display = "inline-block";
      badge.textContent = unread > 99 ? "…" : unread;
    }
    const listEl = document.getElementById("commentsList");
    if (notifications.length === 0) {
      listEl.innerHTML = `<div class="fav-empty"><i class="far fa-comment-dots"></i>No comment replies yet</div>`;
    } else {
      listEl.innerHTML = notifications.map(n => `
        <div class="notif-item ${n.read ? "" : "unread"}">
          <div class="notif-header">
            <div class="notif-icon"><i class="fas fa-comment-dots"></i></div>
            <span class="notif-type-tag">Comment Reply</span>
            ${!n.read ? '<span class="notif-dot"></span>' : ""}
            <span class="notif-meta">${formatTime(n.timestamp)}</span>
          </div>
          <div class="notif-content">${Render.escapeHtml(n.content)}</div>
          ${n.postId ? `<button class="notif-link" data-post-id="${n.postId}">View Post →</button>` : ""}
        </div>`).join("");
    }
    document.getElementById("markCommentsRead").addEventListener("click", () => {
      Store.markAllRead("reply");
      badge.style.display = "none";
      listEl.querySelectorAll(".notif-item").forEach(el => {
        el.classList.remove("unread");
        el.querySelector(".notif-dot")?.remove();
      });
      countEl.textContent = `Total ${notifications.length} notifications`;
    });
  })();

  // ===== Message Replies =====
  (function() {
    const threads = Object.values(Store.messages);
    const msgBadge = document.getElementById("msgBadge");
    document.getElementById("messagesCount").textContent = `Total ${threads.length} conversations`;
    const listEl = document.getElementById("messagesList");
    if (threads.length === 0) {
      listEl.innerHTML = `<div class="fav-empty"><i class="far fa-envelope"></i>No message history yet</div>`;
      msgBadge.style.display = "none";
      return;
    }
    // 统计有新消息的会话（最后一条不是自己发的）
    const myId = Store.currentUser.id;
    const unreadThreads = threads.filter(t => {
      const msgs = t.messages;
      return msgs.length > 0 && msgs[msgs.length - 1].from !== myId;
    });
    if (unreadThreads.length > 0) {
      msgBadge.style.display = "inline-block";
      msgBadge.textContent = unreadThreads.length > 99 ? "…" : unreadThreads.length;
    }
    listEl.innerHTML = threads.map(t => {
      const msgs = t.messages;
      const last = msgs.length > 0 ? msgs[msgs.length - 1] : null;
      const hasNew = last && last.from !== myId;
      return `
        <div class="msg-thread-item" data-uid="${t.withUser.id}" data-name="${Render.escapeHtml(t.withUser.nickname)}" data-avatar="${Render.escapeHtml(t.withUser.avatarLetter || "U")}">
          <div class="msg-thread-avatar">
            ${Render.escapeHtml(t.withUser.avatarLetter || "U")}
            ${hasNew ? '<span class="msg-thread-unread-dot"></span>' : ""}
          </div>
          <div class="msg-thread-info">
            <div class="msg-thread-name">${Render.escapeHtml(t.withUser.nickname)}</div>
            <div class="msg-thread-preview">${last ? Render.escapeHtml(last.text.slice(0, 30)) : "No messages yet"}</div>
          </div>
          <div class="msg-thread-time">${last ? formatTime(last.timestamp) : ""}</div>
        </div>`;
    }).join("");
    listEl.querySelectorAll(".msg-thread-item").forEach(item => {
      item.addEventListener("click", () => {
        sessionStorage.setItem("th_open_chat", JSON.stringify({
          uid: item.dataset.uid,
          name: item.dataset.name,
          avatar: item.dataset.avatar
        }));
        window.location.href = "index.html";
      });
    });
  })();
});
</script>
</body>
</html>
